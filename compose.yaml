services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.28
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://localhost:9200/_cluster/health >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 30
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data

  integration-tests:
    profiles: ["test"]
    build:
      context: .
      target: test
    environment:
      ELS_ADRESSER_URL: http://elasticsearch:9200
      ELS_ADRESSER_INDEX: adressesok-test
      ADRESSER_API_LOG_LEVEL: ERROR
    depends_on:
      elasticsearch:
        condition: service_healthy
    command: ["bun", "test", "test/integration"]

volumes:
  elasticsearch-data:
